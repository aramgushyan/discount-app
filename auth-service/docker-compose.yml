services:
  auth-db:
    image: postgres:16
    container_name: auth-db
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5434:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data

volumes:
  auth_db_data: