spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5434/auth_db
    username: postgres
    password: "1234"
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

jwt:
  secret: "secretsecretsecretsecretsecretsecret1"
  expiration: 3600000

logging:
  level:
    org.flywaydb: DEBUG